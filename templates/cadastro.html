<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css">
  <title>Cuide+/Cadastro</title>
</head>
<body class="auth-body">
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle"><i class="bi bi-heart-pulse" style="color:#fff;font-size:24px;"></i></div>
      <h1>Cuide+</h1>
      <p>Crie sua conta para começar a acompanhar sua saúde.</p>
    </div>

    <div class="messagem2" style="width:100%;">
      <p>Este app não receita nem se auto-medica. Toda recomendação vem de profissionais de saúde.</p>
    </div>

    {% if erro %}<div class="auth-erro">{{ erro }}</div>{% endif %}

    <form method="POST" class="auth-form">
      <label>Nome completo</label>
      <input type="text" name="nome" required placeholder="Digite o seu nome">

      <label>E-mail</label>
      <input type="email" name="email" required placeholder="voce@email.com">

      <label>Número de telefone</label>
      <input type="text" name="telefone" placeholder="+244 9xx xxx xxx">

      <label>Data de nascimento</label>
      <input type="text" name="data_nascimento" placeholder="DD/MM/AAAA" inputmode="numeric" maxlength="10" oninput="mascararData(this)">

      <label>Gênero</label>
      <select name="sexo">
        <option value="">—</option>
        <option value="feminino">Feminino</option>
        <option value="masculino">Masculino</option>
        <option value="outro">Outro</option>
      </select>

      <label>Senha</label>
      <input type="password" name="senha" required placeholder="••••••••">

      <button type="submit" class="btn" style="width:100%; margin-top:15px;">Criar conta</button>
    </form>

    <p class="auth-alt">Já tem conta? <a href="{{ url_for('paciente.login') }}">Entrar</a></p>
  </div>

  <script src="{{ url_for('static', filename='js/loading.js') }}"></script>
  <script>
    function mascararData(input) {
      let v = input.value.replace(/\D/g, '').slice(0, 8);
      if (v.length > 4) {
        v = v.replace(/(\d{2})(\d{2})(\d{0,4})/, '$1/$2/$3');
      } else if (v.length > 2) {
        v = v.replace(/(\d{2})(\d{0,2})/, '$1/$2');
      }
      input.value = v;
    }
  </script>
</body>
</html>
