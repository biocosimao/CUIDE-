{% extends "dashboard/base_dash.html" %}
{% block title %}Editar {{ membro.nome }}{% endblock %}
{% block content %}
  <div class="dash-header-row">
    <div><h2>Editar profissional</h2><p>Altere os dados de acesso de {{ membro.nome }}.</p></div>
  </div>

  {% if erro %}<div class="dash-alert erro">{{ erro }}</div>{% endif %}

  <form method="POST" class="dash-card dash-form">
    <label>Nome completo</label>
    <input type="text" name="nome" value="{{ membro.nome }}" required>

    <label>E-mail</label>
    <input type="email" name="email" value="{{ membro.email }}" required>

    <label>Papel</label>
    <select name="papel">
      <option value="medico" {% if membro.papel=='medico' %}selected{% endif %}>Médico</option>
      <option value="enfermeiro" {% if membro.papel=='enfermeiro' %}selected{% endif %}>Enfermeiro</option>
      <option value="analista" {% if membro.papel=='analista' %}selected{% endif %}>Analista</option>
      <option value="admin" {% if membro.papel=='admin' %}selected{% endif %}>Administrador</option>
    </select>

    <label>Registro profissional (CRM/COREN, opcional)</label>
    <input type="text" name="registro_profissional" value="{{ membro.registro_profissional or '' }}">

    <hr style="margin:18px 0; border-color:#e5e7eb;">
    <label><i class="bi bi-key"></i> Nova senha (opcional)</label>
    <input type="password" name="nova_senha" placeholder="Deixe em branco para manter a senha atual">
    <p style="color:#6b7280; font-size:13px;">Mínimo de 6 caracteres, se preenchido.</p>

    <div class="dash-form-actions">
      <a href="{{ url_for('dashboard.equipe') }}" class="dash-btnsecond">Cancelar</a>
      <button type="submit" class="dash-btnprimary">Salvar alterações</button>
    </div>
  </form>

  <form method="POST" action="{{ url_for('dashboard.remover_profissional', profissional_id=membro.id) }}"
        onsubmit="return confirm('Remover definitivamente {{ membro.nome }} da equipe?');" style="margin-top:14px;">
    <button type="submit" class="dash-btndanger"><i class="bi bi-trash3"></i> Remover profissional</button>
  </form>
{% endblock %}
