{% extends "dashboard/base_dash.html" %}
{% block title %}Novo profissional{% endblock %}
{% block content %}
  <div class="dash-header-row"><div><h2>Novo profissional</h2><p>Crie o acesso de um médico, enfermeiro ou analista.</p></div></div>

  {% if erro %}<div class="dash-alert erro">{{ erro }}</div>{% endif %}

  <form method="POST" class="dash-card dash-form">
    <label>Nome completo</label>
    <input type="text" name="nome" required>
    <label>E-mail</label>
    <input type="email" name="email" required>
    <label>Senha provisória</label>
    <input type="password" name="senha" required>
    <label>Papel</label>
    <select name="papel">
      <option value="medico">Médico</option>
      <option value="enfermeiro">Enfermeiro</option>
      <option value="analista">Analista</option>
      <option value="admin">Administrador</option>
    </select>
    <label>Registro profissional (CRM/COREN, opcional)</label>
    <input type="text" name="registro_profissional">

    <div class="dash-form-actions">
      <a href="{{ url_for('dashboard.equipe') }}" class="dash-btnsecond">Cancelar</a>
      <button type="submit" class="dash-btnprimary">Criar acesso</button>
    </div>
  </form>
{% endblock %}
