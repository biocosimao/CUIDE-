<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css">
  <title>Cuide+ Hospital/Entrar</title>
</head>
<body class="auth-body">
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle"><i class="bi bi-hospital" style="color:#fff;font-size:22px;"></i></div>
      <h1>Cuide+ Hospital</h1>
      <p>Painel para médicos, enfermeiros, analistas e administradores.</p>
    </div>

    {% if erro %}<div class="auth-erro">{{ erro }}</div>{% endif %}

    <form method="POST" class="auth-form">
      <label>E-mail institucional</label>
      <input type="email" name="email" required placeholder="voce@hospital.com">
      <label>Senha</label>
      <input type="password" name="senha" required placeholder="••••••••">
      <button type="submit" class="btn" style="width:100%;">Entrar</button>
    </form>
    <p class="auth-alt">Acesso restrito à equipe do hospital.</p>
    <p class="auth-alt"><a href="{{ url_for('paciente.login') }}"><i class="bi bi-arrow-left"></i> Voltar para o login do paciente</a></p>
  </div>

  <script src="{{ url_for('static', filename='js/loading.js') }}"></script>
</body>
</html>
