<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/entrada.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css">
  <title>Cuide+/Entrando</title>
</head>
<body class="entrada-body">

  <div class="entrada-painel entrada-painel-verde"></div>
  <div class="entrada-painel entrada-painel-branco"></div>

  <div class="entrada-conteudo">
    <div class="entrada-logo-circulo">
      <i class="bi bi-heart-pulse-fill"></i>
    </div>
    <h1 class="entrada-titulo">Cuide+</h1>
    <div class="entrada-pontos">
      <span></span><span></span><span></span>
    </div>
  </div>

  <script>
    // 1) logo aparece e "carrega" por um instante
    // 2) o conteúdo some e o fundo verde/branco abre (verde sobe, branco desce)
    // 3) quando a animação termina, 
    setTimeout(function () {
      document.body.classList.add('entrada-sair');
    }, 2500);

    setTimeout(function () {
      window.location.href = "{{ url_for('paciente.home') }}";
    }, 2350);
  </script>
</body>
</html>
