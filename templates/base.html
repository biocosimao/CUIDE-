<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
   {% block extra_css %}{% endblock %}
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   <title>Cuide+/{% block title %}{% endblock %}</title>
</head>

<body class="app-shell">

  <!-- Overlay de carregamento -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

   <header class="header">
    <div class="logo-container">
      <div class="logo-circle"><i class="fa-solid fa-heart-pulse" style="color:#fff;font-size:20px;"></i></div>
      <div>
        <h1 class="point1">Cuide+</h1>
        <p class="point2">Cuidar de você, todo dia.</p>
      </div>
    </div>
    <div class="menu">
      <a href="{{ url_for('paciente.dicas_page') }}"><i class="fa-solid fa-lightbulb"></i></a>
      <a href="{{ url_for('paciente.perfil_page') }}"><i class="fa-solid fa-user"></i></a>
      <div class="PT">PT</div>
    </div>
  </header>
   <div class="header_space"></div>

   <div class="app-content">
   {% block content %}{% endblock %}
   </div>

<footer class="bottom-nav">
    <div class="nav-item {% if request.path == url_for('paciente.home') %}active{% endif %}">
  <a href="{{ url_for('paciente.home') }}"><i class="bi bi-house-door-fill"></i>
   <span>Início</span>
</a>
    </div>
    <div class="nav-item {% if request.path == url_for('paciente.sintomas_page') %}active{% endif %}">
     <a href="{{ url_for('paciente.sintomas_page') }}"> <i class="bi bi-clipboard2-pulse-fill"></i>
      <span>Sintomas</span>
   </a>
    </div>
    <div class="nav-item {% if request.path == url_for('paciente.receitas_page') %}active{% endif %}">
     <a href="{{ url_for('paciente.receitas_page') }}"><i class="bi bi-capsule"></i>
      <span>Receitas</span>
   </a>
    </div>
    <div class="nav-item {% if request.path == url_for('paciente.diario_page') %}active{% endif %}">
   <a href="{{ url_for('paciente.diario_page') }}"><i class="bi bi-journal-text"></i>
      <span>Diário</span>
   </a>
    </div>
    <div class="nav-item {% if request.path == url_for('paciente.relatorio_page') %}active{% endif %}">
    <a href="{{ url_for('paciente.relatorio_page') }}"><i class="bi bi-file-earmark-bar-graph-fill"></i>
      <span>Relatório</span>
   </a>
    </div>
     </footer>

<script src="{{ url_for('static', filename='js/loading.js') }}"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
{% block scripts %}{% endblock %}
</body>

</html>
